name: GPT-OS Pipeline

on:
  repository_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure git
        run: |
          git config user.name "gpt-os"
          git config user.email "gpt-os@local"

      - name: Write file
        if: github.event.event_type == 'write_file'
        run: |
          mkdir -p "$(dirname "${{ github.event.path }}")"
          echo "${{ github.event.content }}" > "${{ github.event.path }}"

      - name: Commit changes
        run: |
          git add .
          git commit -m "GPT-OS update" || echo "no changes"
          git push

      - name: Run analysis
        if: github.event.event_type == 'run_analysis'
        run: |
          mkdir -p outputs
          echo "analysis completed" > outputs/result.txt

      - name: Commit outputs
        run: |
          git add .
          git commit -m "GPT-OS outputs" || echo "no changes"
          git push